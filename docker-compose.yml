version: '3.8'

services:
  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306" # Map to 3307 to avoid conflict with your local MySQL
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql

  book-service:
    build:
      context: ./services/book-service
    ports:
      - "3001:3000"
    environment:
      - SERVER_PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=book_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - APP_RECOMMENDATION_URL=http://52.73.13.84
    depends_on:
      - mysql

  customer-service:
    build:
      context: ./services/customer-service
    ports:
      - "3002:3000"
    environment:
      - SERVER_PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=customer_db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - KAFKA_BROKERS=52.73.13.84:9092,100.51.187.149:9092,52.54.87.18:9092
    depends_on:
      - mysql

  crm-service:
    build:
      context: ./services/crm-service
    environment:
      - SERVER_PORT=4000
      - KAFKA_BROKERS=52.73.13.84:9092,100.51.187.149:9092,52.54.87.18:9092
      - ANDREW_ID=rdhurand

  web-bff:
    build:
      context: ./services/web-bff
    ports:
      - "8081:3000"
    environment:
      - SERVER_PORT=3000
      - BOOK_SERVICE_URL=http://book-service:3000
      - CUSTOMER_SERVICE_URL=http://customer-service:3000
    depends_on:
      - book-service
      - customer-service

  mobile-bff:
    build:
      context: ./services/mobile-bff
    ports:
      - "8082:3000"
    environment:
      - SERVER_PORT=3000
      - BOOK_SERVICE_URL=http://book-service:3000
      - CUSTOMER_SERVICE_URL=http://customer-service:3000
    depends_on:
      - book-service
      - customer-service
