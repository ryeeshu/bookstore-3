apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-service
  template:
    metadata:
      labels:
        app: book-service
    spec:
      containers:
      - name: book-service
        image: ryeeshu/book-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: SERVER_PORT
          value: "3000"
        - name: DB_HOST
          value: "bookstore-db-dev.cluster-ct40ymgiu3r4.us-east-1.rds.amazonaws.com"
        - name: DB_NAME
          value: "book_db"
        - name: DB_PORT
          value: "3306"
        - name: DB_USER
          value: "books_svc"
        - name: DB_PASSWORD
          value: "awsadmin"
        - name: RECOMMENDATION_SERVICE_URL
          value: "http://52.73.13.84"
        - name: RECOMMENDATION_TIMEOUT_MS
          value: "3000"
        - name: CIRCUIT_BREAKER_OPEN_MS
          value: "60000"
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: book-service
  namespace: bookstore-ns
spec:
  selector:
    app: book-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
