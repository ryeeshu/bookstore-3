apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-bff
  template:
    metadata:
      labels:
        app: web-bff
    spec:
      containers:
      - name: web-bff
        image: ryeeshu/web-bff:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /status
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: BOOK_SERVICE_URL
          value: "http://book-service"
        - name: CUSTOMER_SERVICE_URL
          value: "http://customer-service"
---
apiVersion: v1
kind: Service
metadata:
  name: web-bff
  namespace: bookstore-ns
spec:
  type: LoadBalancer
  selector:
    app: web-bff
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
