server.port=${SERVER_PORT:4000}

spring.kafka.bootstrap-servers=${KAFKA_BROKERS:52.73.13.84:9092,100.51.187.149:9092,52.54.87.18:9092}
spring.kafka.consumer.group-id=crm-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
app.kafka.topic=${KAFKA_TOPIC:rdhurand.customer.evt}
app.andrew.id=${ANDREW_ID:rdhurand}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true