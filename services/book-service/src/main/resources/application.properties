server.port=${SERVER_PORT:3000}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:book_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

app.llm.provider=${LLM_PROVIDER:gemini}
app.llm.api.key=${LLM_API_KEY:}
app.llm.model=${LLM_MODEL:gemini-1.5-flash}
app.llm.timeout.ms=${LLM_TIMEOUT_MS:15000}